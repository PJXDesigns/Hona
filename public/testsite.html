<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020617" />
  <title>Lamp Demo · Hona Test Build</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Tailwind CDN + custom config for bg-gradient-conic (shadcn convention) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          backgroundImage: {
            'gradient-conic': 'conic-gradient(var(--conic-position), var(--tw-gradient-stops))',
          },
        },
      },
    };
  </script>

  <style>
    html, body { margin: 0; background: #020617; color: #fff; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  </style>

  <!-- React + Babel via CDN. No framer-motion: we shim the small subset we use
       (initial/whileInView with transition.delay/duration/ease) via IntersectionObserver
       + CSS transitions. Avoids the framer-motion@11 UMD packaging issue that broke
       the previous test build. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useRef, useState, useEffect } = React;

    /* ----- shadcn-style cn() utility (filter + join, no clsx/twMerge needed for this demo) ----- */
    function cn(...inputs) {
      return inputs.flat(Infinity).filter(Boolean).join(' ');
    }

    /* ----- Tiny framer-motion shim: just enough for initial / whileInView / transition.{delay,duration,ease} ----- */

    function useInView(ref, threshold = 0.1) {
      const [inView, setInView] = useState(false);
      useEffect(() => {
        if (!ref.current) return;
        const obs = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setInView(true);
              obs.disconnect();
            }
          },
          { threshold }
        );
        obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return inView;
    }

    function styleFromMotionProps(props = {}) {
      const { opacity, width, height, y, x, scale } = props;
      const style = {};
      if (opacity !== undefined) style.opacity = opacity;
      if (width   !== undefined) style.width   = width;
      if (height  !== undefined) style.height  = height;
      const transforms = [];
      if (y !== undefined)     transforms.push(`translateY(${typeof y === 'number' ? y + 'px' : y})`);
      if (x !== undefined)     transforms.push(`translateX(${typeof x === 'number' ? x + 'px' : x})`);
      if (scale !== undefined) transforms.push(`scale(${scale})`);
      if (transforms.length) style.transform = transforms.join(' ');
      return style;
    }

    const EASE_MAP = {
      easeInOut: 'cubic-bezier(0.4, 0, 0.2, 1)',
      easeIn:    'cubic-bezier(0.4, 0, 1, 1)',
      easeOut:   'cubic-bezier(0, 0, 0.2, 1)',
      linear:    'linear',
    };

    function makeMotionComponent(Tag) {
      return function MotionEl({
        initial,
        whileInView,
        animate,
        transition = {},
        className,
        style: userStyle,
        children,
        ...rest
      }) {
        const ref = useRef(null);
        const inView = useInView(ref);
        const target = whileInView || animate;
        const active = inView && target;
        const stateProps = active ? target : initial;

        const duration = transition.duration ?? 0.5;
        const delay    = transition.delay    ?? 0;
        const ease     = EASE_MAP[transition.ease] || transition.ease || 'cubic-bezier(0.4, 0, 0.2, 1)';

        const merged = {
          ...userStyle,
          ...styleFromMotionProps(stateProps),
          transition: `opacity ${duration}s ${ease} ${delay}s, width ${duration}s ${ease} ${delay}s, height ${duration}s ${ease} ${delay}s, transform ${duration}s ${ease} ${delay}s`,
        };

        return (
          <Tag ref={ref} className={className} style={merged} {...rest}>
            {children}
          </Tag>
        );
      };
    }

    const motion = {
      div: makeMotionComponent('div'),
      h1:  makeMotionComponent('h1'),
    };

    /* ----- LampContainer (lamp.tsx, JSX-adapted) ----- */

    function LampContainer({ children, className }) {
      return (
        <div
          className={cn(
            'relative flex min-h-screen flex-col items-center justify-center overflow-hidden bg-slate-950 w-full rounded-md z-0',
            className
          )}
        >
          <div className="relative flex w-full flex-1 scale-y-125 items-center justify-center isolate z-0">
            {/* Left cone of light */}
            <motion.div
              initial={{ opacity: 0.5, width: '15rem' }}
              whileInView={{ opacity: 1, width: '30rem' }}
              transition={{ delay: 0.3, duration: 0.8, ease: 'easeInOut' }}
              style={{
                backgroundImage: 'conic-gradient(var(--conic-position), var(--tw-gradient-stops))',
              }}
              className="absolute inset-auto right-1/2 h-56 overflow-visible w-[30rem] bg-gradient-conic from-cyan-500 via-transparent to-transparent text-white [--conic-position:from_70deg_at_center_top]"
            >
              <div className="absolute w-[100%] left-0 bg-slate-950 h-40 bottom-0 z-20 [mask-image:linear-gradient(to_top,white,transparent)]" />
              <div className="absolute w-40 h-[100%] left-0 bg-slate-950 bottom-0 z-20 [mask-image:linear-gradient(to_right,white,transparent)]" />
            </motion.div>

            {/* Right cone of light */}
            <motion.div
              initial={{ opacity: 0.5, width: '15rem' }}
              whileInView={{ opacity: 1, width: '30rem' }}
              transition={{ delay: 0.3, duration: 0.8, ease: 'easeInOut' }}
              style={{
                backgroundImage: 'conic-gradient(var(--conic-position), var(--tw-gradient-stops))',
              }}
              className="absolute inset-auto left-1/2 h-56 w-[30rem] bg-gradient-conic from-transparent via-transparent to-cyan-500 text-white [--conic-position:from_290deg_at_center_top]"
            >
              <div className="absolute w-40 h-[100%] right-0 bg-slate-950 bottom-0 z-20 [mask-image:linear-gradient(to_left,white,transparent)]" />
              <div className="absolute w-[100%] right-0 bg-slate-950 h-40 bottom-0 z-20 [mask-image:linear-gradient(to_top,white,transparent)]" />
            </motion.div>

            {/* Glow layers + masks */}
            <div className="absolute top-1/2 h-48 w-full translate-y-12 scale-x-150 bg-slate-950 blur-2xl"></div>
            <div className="absolute top-1/2 z-50 h-48 w-full bg-transparent opacity-10 backdrop-blur-md"></div>
            <div className="absolute inset-auto z-50 h-36 w-[28rem] -translate-y-1/2 rounded-full bg-cyan-500 opacity-50 blur-3xl"></div>

            <motion.div
              initial={{ width: '8rem' }}
              whileInView={{ width: '16rem' }}
              transition={{ delay: 0.3, duration: 0.8, ease: 'easeInOut' }}
              className="absolute inset-auto z-30 h-36 w-64 -translate-y-[6rem] rounded-full bg-cyan-400 blur-2xl"
            />

            <motion.div
              initial={{ width: '15rem' }}
              whileInView={{ width: '30rem' }}
              transition={{ delay: 0.3, duration: 0.8, ease: 'easeInOut' }}
              className="absolute inset-auto z-50 h-0.5 w-[30rem] -translate-y-[7rem] bg-cyan-400"
            />

            <div className="absolute inset-auto z-40 h-44 w-full -translate-y-[12.5rem] bg-slate-950"></div>
          </div>

          <div className="relative z-50 flex -translate-y-80 flex-col items-center px-5">
            {children}
          </div>
        </div>
      );
    }

    /* ----- LampDemo (demo.tsx, JSX-adapted) ----- */

    function LampDemo() {
      return (
        <LampContainer>
          <motion.h1
            initial={{ opacity: 0.5, y: 100 }}
            whileInView={{ opacity: 1, y: 0 }}
            transition={{ delay: 0.3, duration: 0.8, ease: 'easeInOut' }}
            className="mt-8 bg-gradient-to-br from-slate-300 to-slate-500 py-4 bg-clip-text text-center text-4xl font-medium tracking-tight text-transparent md:text-7xl"
          >
            Build lamps <br /> the right way
          </motion.h1>
        </LampContainer>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LampDemo />);
  </script>
</body>
</html>
