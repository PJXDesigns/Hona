  <!-- Liquid-glass utilities + base reset -->
  <style>
    html, body { margin: 0; background: #000; color: #fff; }
    body { font-family: 'Barlow', sans-serif; -webkit-font-smoothing: antialiased; }
    *::selection { background: rgba(255,255,255,0.2); }

    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }

    .liquid-glass-strong {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }

    /* Make sure videos sit below the chrome */
    video { display: block; }
  </style>

  <!-- React + ReactDOM + Babel + Framer Motion -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
  <script>
    window.Motion = window.FramerMotion;
    // Quiet benign "each child should have a unique key" dev warnings that
    // Framer Motion sometimes triggers on legitimate list rendering.
    const _err = console.error;
    console.error = function (msg, ...rest) {
      if (typeof msg === 'string' && msg.indexOf('unique "key" prop') !== -1) return;
      return _err.call(console, msg, ...rest);
    };
  </script>

<body>

  <script type="text/babel">

    function MaterialImageIcon({ className = 'h-6 w-6 text-white' }) {

        </svg>

    }

    function MaterialMovieIcon({ className = 'h-6 w-6 text-white' }) {

        <svg className={className} viewBox="0 0 24 24" fill="currentColor">

    function MaterialLightbulbIcon({ className = 'h-6 w-6 text-white' }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="currentColor">

        </svg>
      );
    }

    /* ---------- FadingVideo (rAF-driven crossfade, manual loop) ---------- */

    const FADE_MS = 500;
    const FADE_OUT_LEAD = 0.55;

    function FadingVideo({ src, className = '', style = {} }) {
      const videoRef = useRef(null);
      const rafRef = useRef(null);
      const fadingOutRef = useRef(false);

      const fadeTo = (target, duration = FADE_MS) => {
        const video = videoRef.current;
        if (!video) return;
        if (rafRef.current) cancelAnimationFrame(rafRef.current);

        const start = performance.now();
        const from = parseFloat(video.style.opacity || '0') || 0;
        const delta = target - from;

        const step = (now) => {
          const t = Math.min((now - start) / duration, 1);
          video.style.opacity = (from + delta * t).toFixed(3);
          if (t < 1) {
            rafRef.current = requestAnimationFrame(step);
          } else {
            rafRef.current = null;
          }
        };
        rafRef.current = requestAnimationFrame(step);
      };

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;
        video.style.opacity = '0';

        const onLoadedData = () => {
          video.style.opacity = '0';
          const p = video.play();
          if (p && p.catch) p.catch(() => {});
          fadeTo(1);
        };

        const onTimeUpdate = () => {
          if (fadingOutRef.current) return;
          const remaining = video.duration - video.currentTime;
          if (remaining <= FADE_OUT_LEAD && remaining > 0) {
            fadingOutRef.current = true;
            fadeTo(0);
          }
        };

        const onEnded = () => {
          video.style.opacity = '0';
          setTimeout(() => {
            video.currentTime = 0;
            const p = video.play();
            if (p && p.catch) p.catch(() => {});
            fadingOutRef.current = false;
            fadeTo(1);
          }, 100);
        };

        video.addEventListener('loadeddata', onLoadedData);
        video.addEventListener('timeupdate', onTimeUpdate);
        video.addEventListener('ended', onEnded);

        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          video.removeEventListener('loadeddata', onLoadedData);
          video.removeEventListener('timeupdate', onTimeUpdate);
          video.removeEventListener('ended', onEnded);
        };
      }, []);

      return (
        <video
          ref={videoRef}
          src={src}
          autoPlay
          muted
          playsInline
          preload="auto"
          className={className}
          style={{ opacity: 0, ...style }}
        />
      );
    }

    /* ---------- BlurText (word-by-word blur-in on viewport entry) ---------- */

    function BlurText({ text, className = '', style = {} }) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);

      useEffect(() => {
        if (!ref.current) return;
        const obs = new IntersectionObserver(
          (entries) => {
            if (entries[0].isIntersecting) {
              setVisible(true);
              obs.disconnect();
            }
          },
          { threshold: 0.1 }
        );
        obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);

      const words = text.split(' ');
      const stepDuration = 0.35;

      return (
        <p
          ref={ref}
          className={className}
          style={{
            display: 'flex',
            flexWrap: 'wrap',
            justifyContent: 'center',
            rowGap: '0.1em',
            ...style,
          }}
        >
          {words.map((word, i) => (
            <motion.span
              key={i}
              style={{ display: 'inline-block', marginRight: '0.28em' }}
              initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
              animate={
                visible
                  ? {
                      filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                      opacity: [0, 0.5, 1],
                      y: [50, -5, 0],
                    }
                  : undefined
              }
              transition={{
                duration: stepDuration * 2,
                times: [0, 0.5, 1],
                ease: 'easeOut',
                delay: (i * 100) / 1000,
              }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    }

    /* ---------- Navbar (fixed top) ---------- */

          {/* Center pill */}

    /* ---------- Hero (Section 1) ---------- */

    const HERO_VIDEO =

    function HeroBadge() {

    function HeroSection() {

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-16">

    /* ---------- App + mount ---------- */

    function App() {
      return (

        </div>

    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
