     The crossbar is offset slightly off-center to give the mark one
     distinguishing detail, per the design brief. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#141412"/>
  <!-- Left stroke -->
  <rect x="14" y="14" width="8" height="36" fill="#F8F7F2"/>
  <!-- Right stroke -->
  <rect x="42" y="14" width="8" height="36" fill="#F8F7F2"/>
  <!-- Crossbar — slightly above center for the one distinguishing detail -->
  <rect x="14" y="28" width="36" height="6" fill="#F8F7F2"/>
</svg>
