<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F8F7F2" />
    <meta name="description" content="Hona is a daily training dashboard for athletes. Sharpen the athlete — small, consistent adjustments that compound over months." />

    <!-- Open Graph — used by iMessage, Facebook, LinkedIn, Slack, Discord, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hona.fitness/" />
    <meta property="og:site_name" content="Hona" />
    <meta property="og:title" content="Hona — Sharpen the athlete." />
    <meta property="og:description" content="A calm, daily dashboard for athletes. Training, nutrition, body composition, recovery — one screen, one slope, one practice." />
    <!-- Single OG image — square. Most messengers (iMessage, WhatsApp, Slack)
         render best with 1:1, and listing multiple og:image tags makes iMessage
         show them all side-by-side. Twitter gets its own landscape image below. -->
    <meta property="og:image" content="https://hona.fitness/og-image-square.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="1200" />
    <meta property="og:image:alt" content="Hona — Sharpen the athlete." />

    <!-- Twitter / X Card uses its own image tag, separate from og:image -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hona — Sharpen the athlete." />
    <meta name="twitter:description" content="A calm, daily dashboard for athletes. One screen, one slope, one practice." />
    <meta name="twitter:image" content="https://hona.fitness/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Hona — Sharpen the athlete.</title>
  </head>
  <body class="bg-paper-100 text-ink-700 antialiased font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
